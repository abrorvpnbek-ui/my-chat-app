<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Личный чат</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Manrope:wght@200;400;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<style>
:root {
  --lunar-gold: #dcc66e;
  --deep-void:  #020408;
  --glass:      rgba(11, 19, 38, 0.6);
}
body {
  background-color: var(--deep-void);
  color: #c4c7ca;
  font-family: 'Manrope', sans-serif;
  overflow: hidden;
  height: 100dvh;
  margin: 0;
}
.star-field {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: radial-gradient(circle at center, #050a15 0%, #000 100%);
  z-index: -1;
}
.star {
  position: absolute; background: white; border-radius: 50%; opacity: .5;
  animation: twinkle var(--duration) infinite ease-in-out;
}
@keyframes twinkle {
  0%,100% { opacity:.3; transform:scale(1); }
  50%      { opacity:1;  transform:scale(1.2); }
}
.comet {
  position:absolute; width:2px; height:2px; background:#fff; border-radius:50%;
  box-shadow:0 0 10px 2px rgba(255,255,255,.8),0 0 20px 4px rgba(220,198,110,.4);
  z-index:-1; pointer-events:none;
}
.comet::after {
  content:''; position:absolute; top:50%; right:0;
  transform:translateY(-50%);
  width:100px; height:2px;
  background:linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(220,198,110,.6) 100%);
  transform-origin:right;
}
@keyframes shoot {
  0%   { transform:translate(0,0) rotate(215deg); opacity:0; }
  10%  { opacity:1; }
  90%  { opacity:1; }
  100% { transform:translate(-1000px,1000px) rotate(215deg); opacity:0; }
}
.glass-panel {
  background: var(--glass);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(220,198,110,.1);
}
/* Message bubbles */
.msg-bubble {
  max-width:78%; padding:12px 16px; border-radius:20px;
  margin-bottom:4px; position:relative; font-size:14px; line-height:1.55;
  word-break:break-word; cursor:pointer; transition:filter .15s;
}
.msg-bubble:hover { filter:brightness(1.12); }
.msg-bubble.mine {
  background:rgba(220,198,110,.12);
  border:1px solid rgba(220,198,110,.25);
  margin-left:auto; border-bottom-right-radius:4px;
}
.msg-bubble.mine.grouped { border-radius:20px 4px 4px 20px; }
.msg-bubble.theirs {
  background:rgba(19,27,46,.85);
  border:1px solid rgba(185,200,222,.1);
  margin-right:auto; border-bottom-left-radius:4px;
}
.msg-bubble.theirs.grouped { border-radius:4px 20px 20px 4px; }
.msg-bubble.sticker {
  background:transparent!important; border:none!important;
  padding:4px; font-size:56px; line-height:1; max-width:80px;
  transition:transform .15s;
}
.msg-bubble.sticker:hover { transform:scale(1.12); filter:none; }

.msg-author { font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; font-family:'Space Grotesk',sans-serif; }
.mine-group  .msg-author { color:#dcc66e; text-align:right; }
.theirs-group .msg-author { color:#8ab4d4; }
.msg-time { font-size:9px; color:rgba(255,255,255,.2); margin-top:4px; font-family:'Space Grotesk',sans-serif; }
.mine-group  .msg-time { text-align:right; }

.del-btn {
  background:none; border:1px solid transparent; border-radius:6px;
  color:#ff6080; cursor:pointer; font-size:11px; padding:2px 6px;
  opacity:0; transition:opacity .15s; flex-shrink:0; align-self:center;
}
.msg-row:hover .del-btn { opacity:.6; border-color:rgba(255,96,128,.2); }
.del-btn:hover { opacity:1!important; }

/* Reactions */
.reactions-row { display:flex; flex-wrap:wrap; gap:3px; margin-top:3px; }
.mine-group  .reactions-row { justify-content:flex-end; }
.theirs-group .reactions-row { justify-content:flex-start; }
.reaction-chip {
  display:flex; align-items:center; gap:2px;
  background:rgba(19,27,46,.9); border:1px solid rgba(220,198,110,.15);
  border-radius:20px; padding:2px 7px; font-size:12px; cursor:pointer;
  color:#c4c7ca; transition:all .15s;
}
.reaction-chip:hover { border-color:rgba(220,198,110,.4); }
.reaction-chip.mine-reaction { background:rgba(220,198,110,.15); border-color:rgba(220,198,110,.4); }
.reaction-chip .cnt { font-size:9px; color:rgba(255,255,255,.3); }

/* Reaction popup */
.reaction-popup {
  position:fixed; z-index:300; display:flex; gap:3px; padding:6px 12px;
  background:rgba(11,19,38,.97); border:1px solid rgba(220,198,110,.2);
  border-radius:32px; box-shadow:0 8px 40px rgba(0,0,0,.8);
  backdrop-filter:blur(20px);
}
.reaction-popup.hidden { display:none; }
.reaction-popup button { background:none; border:none; font-size:22px; cursor:pointer; padding:2px 3px; border-radius:8px; transition:transform .1s; line-height:1; }
.reaction-popup button:hover { transform:scale(1.35); }

/* Scrollbar */
.custom-scrollbar::-webkit-scrollbar { width:4px; }
.custom-scrollbar::-webkit-scrollbar-track { background:transparent; }
.custom-scrollbar::-webkit-scrollbar-thumb { background:rgba(220,198,110,.2); border-radius:10px; }

/* Picker panels */
.picker-panel { display:none; flex-shrink:0; border-top:1px solid rgba(220,198,110,.08); padding:10px 12px; background:rgba(5,10,20,.9); }
.picker-panel.open { display:block; }
.panel-tabs { display:flex; gap:6px; margin-bottom:8px; }
.panel-tab { padding:4px 12px; background:transparent; border:1px solid rgba(220,198,110,.2); border-radius:20px; font-size:15px; cursor:pointer; transition:all .15s; line-height:1; }
.panel-tab.active { background:rgba(220,198,110,.15); border-color:rgba(220,198,110,.5); }
.emoji-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:2px; overflow-y:auto; max-height:110px; scrollbar-width:thin; scrollbar-color:rgba(220,198,110,.2) transparent; }
.emoji-btn { background:none; border:none; font-size:21px; cursor:pointer; padding:4px; border-radius:7px; line-height:1; transition:transform .1s, background .1s; }
.emoji-btn:hover { transform:scale(1.3); background:rgba(220,198,110,.1); }
.sticker-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; overflow-y:auto; max-height:110px; }
.sticker-btn { background:rgba(19,27,46,.8); border:1px solid rgba(220,198,110,.1); border-radius:10px; font-size:32px; cursor:pointer; padding:6px 3px; line-height:1; transition:all .15s; }
.sticker-btn:hover { background:rgba(220,198,110,.1); border-color:rgba(220,198,110,.4); transform:scale(1.08); }

/* Status dropdown */
.status-dropdown { display:none; position:absolute; right:0; top:calc(100% + 6px); background:rgba(11,19,38,.98); border:1px solid rgba(220,198,110,.15); border-radius:18px; padding:8px; width:185px; z-index:100; box-shadow:0 8px 40px rgba(0,0,0,.8); backdrop-filter:blur(20px); }
.status-dropdown.open { display:block; }
.status-opt { display:flex; align-items:center; gap:10px; width:100%; padding:8px 10px; background:transparent; border:none; border-radius:10px; cursor:pointer; color:#c4c7ca; font-size:12px; font-family:'Manrope',sans-serif; text-align:left; transition:background .15s; }
.status-opt:hover { background:rgba(220,198,110,.08); }
.status-opt.active { background:rgba(220,198,110,.12); color:#dcc66e; }

/* Login */
#login-screen { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; z-index:50; }
#login-screen.hidden { display:none; }
.login-box {
  width:320px; border-radius:28px; padding:40px 32px; text-align:center;
  background:rgba(11,19,38,.85); border:1px solid rgba(220,198,110,.15);
  box-shadow:0 0 60px rgba(220,198,110,.08),0 32px 80px rgba(0,0,0,.8);
  backdrop-filter:blur(20px);
}
.avatar-pick {
  width:78px; height:78px; border-radius:50%;
  background:rgba(11,19,38,.8); border:2px dashed rgba(220,198,110,.2);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  cursor:pointer; gap:3px; transition:all .2s; position:relative; overflow:hidden; margin:0 auto 22px;
}
.avatar-pick:hover { border-color:rgba(220,198,110,.6); transform:scale(1.04); }
.avatar-pick img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:50%; }
.login-input {
  width:100%; padding:12px 16px 12px 42px; border-radius:16px;
  background:rgba(5,10,20,.8); border:1px solid rgba(220,198,110,.1);
  color:#e8e2c8; font-size:14px; font-family:'Manrope',sans-serif;
  outline:none; transition:all .2s; margin-bottom:12px;
}
.login-input:focus { border-color:rgba(220,198,110,.5); box-shadow:0 0 0 3px rgba(220,198,110,.08); }
.login-input::placeholder { color:rgba(220,198,110,.2); }
.input-wrap { position:relative; }
.input-icon { position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:16px; color:rgba(220,198,110,.3); font-family:'Material Icons'; }
.login-btn {
  width:100%; padding:13px; border-radius:16px; border:none; cursor:pointer;
  font-family:'Space Grotesk',sans-serif; font-size:13px; font-weight:700; letter-spacing:2px;
  color:#0b1326; transition:all .2s;
  background:linear-gradient(135deg,#dcc66e,#f9e287);
  box-shadow:0 4px 20px rgba(220,198,110,.25);
}
.login-btn:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(220,198,110,.4); }
.login-btn:active { transform:scale(.97); }

/* Lunar avatar */
.lunar-avatar {
  border-radius:50%; overflow:hidden; position:relative;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; color:#0b1326; font-family:'Space Grotesk',sans-serif;
  background:radial-gradient(circle at 30% 30%,var(--lunar-gold),#0b1326);
  box-shadow:0 0 15px rgba(220,198,110,.3);
  flex-shrink:0;
}
.lunar-avatar img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; border-radius:50%; }

/* Online dot */
.online-dot { width:11px; height:11px; border-radius:50%; background:rgba(255,255,255,.15); border:2px solid var(--deep-void); transition:all .3s; }

/* Message row */
.msg-row { display:flex; align-items:flex-end; gap:7px; margin-bottom:2px; }
.mine-group  .msg-row { flex-direction:row-reverse; }

@keyframes fadeUp { from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;} }
.msg-anim { animation:fadeUp .18s ease; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); display:flex; align-items:center; justify-content:center; z-index:200; }
.modal-overlay.hidden { display:none; }
.modal-box {
  width:290px; border-radius:28px; padding:32px 28px;
  background:rgba(11,19,38,.95); border:1px solid rgba(220,198,110,.15);
  box-shadow:0 12px 60px rgba(0,0,0,.9); backdrop-filter:blur(20px);
}

@media (max-width:768px) {
  .desktop-only { display:none !important; }
}

/* ═══ MOON INTRO ANIMATION ═══ */
#moon-intro {
  position:fixed; inset:0; z-index:999;
  display:flex; align-items:center; justify-content:center;
  background:radial-gradient(circle at center,#050a15,#000);
  pointer-events:none;
}
#moon-intro.done { display:none; }
.moon-orb {
  width:120px; height:120px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #f9e287 0%, #dcc66e 40%, #8b6914 80%, #3a2a05 100%);
  box-shadow:
    0 0 40px rgba(220,198,110,.6),
    0 0 100px rgba(220,198,110,.3),
    inset -20px -10px 40px rgba(0,0,0,.5);
  animation: moonEntry 2.4s cubic-bezier(.22,1,.36,1) forwards;
  position:relative;
}
.moon-orb::before {
  content:''; position:absolute; inset:0; border-radius:50%;
  background:radial-gradient(circle at 25% 25%, rgba(255,255,255,.15) 0%, transparent 50%);
}
/* crater details */
.moon-orb::after {
  content:''; position:absolute; inset:0; border-radius:50%;
  background:
    radial-gradient(circle at 60% 40%, rgba(0,0,0,.3) 0%, transparent 15%),
    radial-gradient(circle at 30% 60%, rgba(0,0,0,.25) 0%, transparent 12%),
    radial-gradient(circle at 75% 65%, rgba(0,0,0,.2) 0%, transparent 10%);
}
.moon-glow-ring {
  position:absolute; width:180px; height:180px; border-radius:50%;
  border:1px solid rgba(220,198,110,.2);
  animation: ringPulse 2.4s ease forwards;
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.moon-glow-ring2 {
  position:absolute; width:240px; height:240px; border-radius:50%;
  border:1px solid rgba(220,198,110,.1);
  animation: ringPulse2 2.4s ease forwards;
  top:50%; left:50%; transform:translate(-50%,-50%);
}
.moon-title {
  position:absolute; bottom:-60px; left:50%; transform:translateX(-50%);
  white-space:nowrap; font-family:'Space Grotesk',sans-serif;
  font-size:13px; font-weight:700; letter-spacing:5px; text-transform:uppercase;
  color:rgba(220,198,110,.8);
  animation: titleFade 2.4s ease forwards;
}
@keyframes moonEntry {
  0%   { transform:scale(0) translateY(60px); opacity:0; }
  30%  { opacity:1; }
  60%  { transform:scale(1.1) translateY(-10px); }
  80%  { transform:scale(.95) translateY(5px); }
  100% { transform:scale(1) translateY(0); opacity:1; }
}
@keyframes ringPulse {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:0; }
  50%  { opacity:.8; }
  100% { transform:translate(-50%,-50%) scale(1.3); opacity:0; }
}
@keyframes ringPulse2 {
  0%   { transform:translate(-50%,-50%) scale(0); opacity:0; }
  30%  { opacity:0; }
  70%  { opacity:.5; }
  100% { transform:translate(-50%,-50%) scale(1.4); opacity:0; }
}
@keyframes titleFade {
  0%,40%  { opacity:0; transform:translateX(-50%) translateY(10px); }
  60%     { opacity:1; transform:translateX(-50%) translateY(0); }
  85%     { opacity:1; }
  100%    { opacity:0; }
}
@keyframes introFadeOut {
  0%   { opacity:1; }
  100% { opacity:0; }
}

/* ═══ RAIN BUTTON ═══ */
#rain-btn {
  position:absolute; top:10px; left:50%; transform:translateX(-50%);
  z-index:10; display:flex; align-items:center; gap:6px;
  padding:5px 14px; border-radius:20px; cursor:pointer; border:none;
  background:rgba(11,19,38,.7); border:1px solid rgba(220,198,110,.2);
  color:rgba(220,198,110,.6); font-size:11px; font-family:'Space Grotesk',sans-serif;
  letter-spacing:1.5px; text-transform:uppercase; transition:all .2s;
  backdrop-filter:blur(10px);
}
#rain-btn:hover { border-color:rgba(220,198,110,.5); color:#dcc66e; }
#rain-btn.active { background:rgba(220,198,110,.15); border-color:rgba(220,198,110,.6); color:#f9e287; }
#rain-btn .rain-icon { font-size:14px; transition:transform .3s; }
#rain-btn.active .rain-icon { animation:rainIconSpin .6s ease; }
@keyframes rainIconSpin {
  0%   { transform:rotate(0) scale(1); }
  50%  { transform:rotate(180deg) scale(1.3); }
  100% { transform:rotate(360deg) scale(1); }
}

/* ═══ FALLING OBJECTS (moon/comet rain) ═══ */
.rain-obj {
  position:fixed; top:-60px; z-index:5; pointer-events:none;
  animation: fallDown var(--fall-dur) linear forwards;
  font-size:var(--fall-size);
  filter:drop-shadow(0 0 8px rgba(220,198,110,.6));
}
@keyframes fallDown {
  0%   { transform:translateY(0) rotate(0deg); opacity:0; }
  5%   { opacity:1; }
  90%  { opacity:1; }
  100% { transform:translateY(110vh) rotate(var(--fall-rot)); opacity:0; }
}

/* Rain type selector popup */
#rain-picker {
  position:absolute; top:44px; left:50%; transform:translateX(-50%);
  z-index:50; display:none;
  background:rgba(11,19,38,.97); border:1px solid rgba(220,198,110,.2);
  border-radius:18px; padding:10px; gap:8px;
  box-shadow:0 8px 40px rgba(0,0,0,.8); backdrop-filter:blur(20px);
  white-space:nowrap;
}
#rain-picker.open { display:flex; }
.rain-opt {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:8px 12px; border-radius:12px; cursor:pointer; border:1px solid transparent;
  transition:all .15s; background:transparent;
}
.rain-opt:hover { background:rgba(220,198,110,.1); border-color:rgba(220,198,110,.3); }
.rain-opt.chosen { background:rgba(220,198,110,.15); border-color:rgba(220,198,110,.5); }
.rain-opt span:first-child { font-size:24px; }
.rain-opt span:last-child { font-size:9px; letter-spacing:1px; text-transform:uppercase; color:rgba(220,198,110,.5); font-family:'Space Grotesk',sans-serif; }
</style>
</head>
<body>

<!-- Star field -->
<div class="star-field" id="stars"></div>

<!-- ═══ MOON INTRO ═══ -->
<div id="moon-intro">
  <div style="position:relative;display:flex;align-items:center;justify-content:center;">
    <div class="moon-glow-ring"></div>
    <div class="moon-glow-ring2"></div>
    <div class="moon-orb">
      <div class="moon-title">Личный чат</div>
    </div>
  </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="w-14 h-14 rounded-2xl mx-auto mb-5 flex items-center justify-center" style="background:radial-gradient(circle at 30% 30%,#dcc66e,#0b1326);box-shadow:0 0 20px rgba(220,198,110,.3);">
      <span class="material-icons text-[#dcc66e] text-3xl">chat_bubble</span>
    </div>
    <h1 class="font-black tracking-[3px] text-xl mb-1 italic" style="background:linear-gradient(135deg,#f9e287,#dcc66e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-family:'Space Grotesk',sans-serif;">ЛИЧНЫЙ ЧАТ</h1>
    <p class="text-[10px] tracking-[2px] uppercase mb-7" style="color:rgba(220,198,110,.3);font-family:'Space Grotesk',sans-serif;">только вы двое</p>

    <div class="avatar-pick" id="login-avatar-pick">
      <span class="material-icons text-[#dcc66e]/30 text-2xl">add_a_photo</span>
      <span class="text-[9px]" style="color:rgba(220,198,110,.3);font-family:'Space Grotesk',sans-serif;">фото</span>
    </div>
    <input type="file" id="login-avatar-input" accept="image/*" style="display:none;"/>

    <div class="input-wrap">
      <span class="input-icon">person</span>
      <input id="name-input" class="login-input" type="text" placeholder="Ваше имя..." maxlength="20"/>
    </div>
    <div id="login-error" style="display:none;color:#ff6080;font-size:12px;margin-bottom:10px;text-align:left;padding-left:4px;"></div>
    <button id="login-btn" class="login-btn">ВОЙТИ</button>
  </div>
</div>

<!-- CHAT SCREEN -->
<div class="flex h-full w-full" id="chat-screen" style="display:none;">

  <!-- Main Chat -->
  <main class="flex flex-col w-full relative" style="height:100dvh;">

    <!-- Header -->
    <header class="glass-panel border-b border-white/5 px-4 flex items-center justify-between z-10 flex-shrink-0" style="height:68px;">
      <div class="flex items-center gap-3">
        <div style="position:relative;">
          <div class="lunar-avatar" id="other-av-wrap" style="width:42px;height:42px;font-size:16px;border:2px solid rgba(220,198,110,.3);">
            <img id="other-av-img" src="" alt="" style="display:none;"/>
            <span id="other-av-letter">?</span>
          </div>
          <div class="online-dot" id="online-dot" style="position:absolute;bottom:-1px;right:-1px;"></div>
        </div>
        <div>
          <h2 id="other-name" class="font-bold text-sm" style="color:#dcc66e;">Ожидание...</h2>
          <p id="other-status" class="text-[10px] uppercase tracking-wider" style="color:rgba(220,198,110,.5);font-family:'Space Grotesk',sans-serif;">нет собеседника</p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <!-- Status picker -->
        <div style="position:relative;" id="status-wrapper">
          <button id="status-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-xl text-[11px] transition-all" style="background:rgba(11,19,38,.8);border:1px solid rgba(220,198,110,.15);color:rgba(220,198,110,.7);font-family:'Space Grotesk',sans-serif;">
            <span id="my-status-emoji" style="font-size:14px;">🏠</span>
            <span id="my-status-label">Дома</span>
            <span style="font-size:9px;opacity:.5;">▾</span>
          </button>
          <div class="status-dropdown" id="status-dropdown"></div>
        </div>

        <!-- My profile -->
        <button id="my-profile-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-xl text-[11px] transition-all" style="background:rgba(11,19,38,.8);border:1px solid rgba(220,198,110,.15);color:rgba(220,198,110,.7);font-family:'Space Grotesk',sans-serif;">
          <div class="lunar-avatar" id="my-av-wrap" style="width:22px;height:22px;font-size:10px;">
            <img id="my-av-img" src="" alt="" style="display:none;"/>
            <span id="my-av-letter">?</span>
          </div>
          <span id="display-username">...</span>
          <span class="material-icons" style="font-size:14px;opacity:.5;">edit</span>
        </button>
      </div>
    </header>

    <!-- Profile modal -->
    <div class="modal-overlay hidden" id="profile-modal">
      <div class="modal-box">
        <div class="text-center font-bold tracking-[2.5px] text-xs mb-6 uppercase" style="color:#dcc66e;font-family:'Space Grotesk',sans-serif;">Мой профиль</div>
        <div style="display:flex;justify-content:center;margin-bottom:20px;">
          <div id="modal-av-preview" class="lunar-avatar" style="width:80px;height:80px;font-size:28px;cursor:pointer;border:2px solid rgba(220,198,110,.25);position:relative;">
            <img id="modal-av-img" src="" alt="" style="display:none;"/>
            <span id="modal-av-letter">?</span>
            <div style="position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;border-radius:50%;opacity:0;transition:opacity .2s;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0">
              <span class="material-icons" style="color:#dcc66e;font-size:22px;">add_a_photo</span>
            </div>
          </div>
          <input type="file" id="modal-av-input" accept="image/*" style="display:none;"/>
        </div>
        <div style="display:flex;gap:10px;">
          <button id="modal-cancel" style="flex:1;padding:11px;border-radius:14px;background:transparent;border:1px solid rgba(220,198,110,.15);color:rgba(220,198,110,.5);font-size:12px;cursor:pointer;font-family:'Space Grotesk',sans-serif;">Отмена</button>
          <button id="modal-save" style="flex:1;padding:11px;border-radius:14px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;color:#0b1326;background:linear-gradient(135deg,#dcc66e,#f9e287);">Сохранить</button>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 custom-scrollbar px-4 py-4 flex flex-col gap-0.5" style="overflow-y:auto;position:relative;">

      <!-- Rain button -->
      <button id="rain-btn">
        <span class="rain-icon">🌙</span>
        <span>Дождь</span>
      </button>
      <!-- Rain type picker -->
      <div id="rain-picker">
        <button class="rain-opt chosen" data-type="moon">
          <span>🌙</span><span>Луны</span>
        </button>
        <button class="rain-opt" data-type="comet">
          <span>☄️</span><span>Кометы</span>
        </button>
        <button class="rain-opt" data-type="star">
          <span>⭐</span><span>Звёзды</span>
        </button>
        <button class="rain-opt" data-type="planet">
          <span>🪐</span><span>Планеты</span>
        </button>
      </div>

      <div id="empty-state" style="display:flex;flex-direction:column;align-items:center;justify-content:center;margin:auto;gap:10px;text-align:center;">
        <span class="material-icons" style="font-size:48px;color:rgba(220,198,110,.1);">chat_bubble</span>
        <span style="font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(220,198,110,.2);font-family:'Space Grotesk',sans-serif;">Начните разговор</span>
      </div>
    </div>

    <!-- Emoji panel -->
    <div class="picker-panel" id="emoji-panel">
      <div class="panel-tabs" id="emoji-tabs"></div>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <!-- Sticker panel -->
    <div class="picker-panel" id="sticker-panel">
      <div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(220,198,110,.3);margin-bottom:7px;font-family:'Space Grotesk',sans-serif;">Стикеры</div>
      <div class="panel-tabs" id="sticker-tabs"></div>
      <div class="sticker-grid" id="sticker-grid"></div>
    </div>

    <!-- Input -->
    <div class="glass-panel border-t border-white/5 flex-shrink-0 px-4 py-3" style="background:rgba(5,10,20,.9);">
      <div class="glass-panel flex items-end gap-2 rounded-2xl px-3 py-2" style="border-color:rgba(220,198,110,.1);">
        <button id="emoji-btn" class="text-xl flex items-center justify-center w-9 h-9 rounded-full flex-shrink-0 transition-all" style="background:transparent;border:none;cursor:pointer;color:rgba(220,198,110,.3);">😊</button>
        <button id="sticker-btn" class="text-xl flex items-center justify-center w-9 h-9 rounded-full flex-shrink-0 transition-all" style="background:transparent;border:none;cursor:pointer;color:rgba(220,198,110,.3);">🎭</button>
        <textarea id="msg-input" placeholder="Написать..." rows="1"
          class="flex-1 bg-transparent border-none outline-none text-sm resize-none py-2 leading-relaxed"
          style="color:#e8e2c8;font-family:'Manrope',sans-serif;max-height:100px;overflow-y:auto;"
          ></textarea>
        <button id="send-btn" class="flex items-center justify-center w-10 h-10 rounded-full flex-shrink-0 transition-all active:scale-90 opacity-30" style="background:linear-gradient(135deg,#00bcd4,#4dd0e1);box-shadow:0 0 20px rgba(0,188,212,.3);border:none;cursor:default;">
          <span class="material-icons text-white" style="font-size:20px;">send</span>
        </button>
      </div>
    </div>

  </main>
</div>

<!-- Reaction popup -->
<div class="reaction-popup hidden" id="reaction-popup"></div>

<script>
// ─── Star field ────────────────────────────────────────────
const starContainer = document.getElementById('stars');
for (let i=0; i<200; i++) {
  const s=document.createElement('div'); s.className='star';
  const sz=Math.random()*2+.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--duration:${Math.random()*3+2}s;animation-delay:${Math.random()*5}s;`;
  starContainer.appendChild(s);
}
function createComet() {
  const c=document.createElement('div'); c.className='comet';
  c.style.left=(Math.random()*100+50)+'%';
  c.style.top=(Math.random()*-20)+'%';
  const dur=Math.random()*2000+1000;
  c.style.animation=`shoot ${dur}ms linear forwards`;
  starContainer.appendChild(c);
  setTimeout(()=>c.remove(),dur);
}
function spawnComets(){ createComet(); setTimeout(spawnComets,Math.random()*4000+2000); }
setTimeout(spawnComets,3000);

// ─── Moon intro ────────────────────────────────────────────
const moonIntro = document.getElementById('moon-intro');
setTimeout(() => {
  moonIntro.style.animation = 'introFadeOut .8s ease forwards';
  setTimeout(() => moonIntro.classList.add('done'), 800);
}, 2600);

// ─── Rain system ───────────────────────────────────────────
const rainBtn    = document.getElementById('rain-btn');
const rainPicker = document.getElementById('rain-picker');
let rainActive   = false;
let rainInterval = null;
let rainType     = 'moon';

const RAIN_EMOJIS = {
  moon:   ['🌙','🌕','🌖','🌗','🌘','🌑','🌒','🌓','🌔'],
  comet:  ['☄️','✨','💫','⚡','🌟'],
  star:   ['⭐','🌟','💛','✨','🔆','🌠'],
  planet: ['🪐','🌍','🌎','🌏','🔵','🔴','⚫'],
};

const RAIN_ICONS = { moon:'🌙', comet:'☄️', star:'⭐', planet:'🪐' };

// Picker toggle
rainBtn.addEventListener('click', e => {
  e.stopPropagation();
  rainPicker.classList.toggle('open');
});

// Pick type
rainPicker.querySelectorAll('.rain-opt').forEach(opt => {
  opt.addEventListener('click', e => {
    e.stopPropagation();
    rainType = opt.dataset.type;
    rainPicker.querySelectorAll('.rain-opt').forEach(o=>o.classList.remove('chosen'));
    opt.classList.add('chosen');
    rainBtn.querySelector('.rain-icon').textContent = RAIN_ICONS[rainType];
    rainPicker.classList.remove('open');
    // Start / restart rain
    startRain();
  });
});

function spawnRainObj() {
  const emojis = RAIN_EMOJIS[rainType];
  const emoji  = emojis[Math.floor(Math.random()*emojis.length)];
  const el     = document.createElement('div');
  el.className = 'rain-obj';
  const size   = Math.random()*20+16;
  const dur    = Math.random()*2500+1500;
  const rot    = (Math.random()*720-360)+'deg';
  el.style.cssText = `left:${Math.random()*100}vw;--fall-dur:${dur}ms;--fall-size:${size}px;--fall-rot:${rot};`;
  el.textContent = emoji;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), dur+100);
}

function startRain() {
  stopRain();
  rainActive = true;
  rainBtn.classList.add('active');
  rainBtn.querySelector('span:last-child').textContent = 'Стоп';
  // Burst of objects
  for(let i=0;i<8;i++) setTimeout(spawnRainObj, i*80);
  // Continuous
  rainInterval = setInterval(()=>{ for(let i=0;i<3;i++) spawnRainObj(); }, 300);
  // Auto-stop after 6 seconds
  setTimeout(stopRain, 6000);
}

function stopRain() {
  if (rainInterval) clearInterval(rainInterval);
  rainInterval = null;
  rainActive   = false;
  rainBtn.classList.remove('active');
  rainBtn.querySelector('span:last-child').textContent = 'Дождь';
}

rainBtn.addEventListener('click', () => {
  if (rainPicker.classList.contains('open')) return;
  if (rainActive) stopRain(); else startRain();
});

document.addEventListener('click', () => rainPicker.classList.remove('open'));
rainPicker.addEventListener('click', e=>e.stopPropagation());
</script>
<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
