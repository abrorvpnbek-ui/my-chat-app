<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Личный чат</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Manrope',sans-serif;
  background:#0a0608;
  color:#f0e8e8;
  display:flex;flex-direction:column;
  height:100dvh;
}
.glass{backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}

/* SCREENS */
.screen{display:none;}
.screen.active{display:flex;}
#login-screen{height:100dvh;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#1a0810 0%,#0a0608 60%,#180a0a 100%);}
#chat-screen{flex-direction:column;height:100dvh;}

/* LOGIN */
.login-box{
  width:320px;border-radius:28px;padding:40px 32px;text-align:center;
  background:linear-gradient(160deg,rgba(30,10,15,.95),rgba(15,5,8,.98));
  border:1px solid rgba(200,50,80,.15);
  box-shadow:0 0 60px rgba(180,20,50,.12),0 32px 80px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04);
}
.login-icon{
  width:60px;height:60px;border-radius:18px;margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;font-size:26px;
  background:linear-gradient(135deg,#c0192a,#8b0000);
  box-shadow:0 8px 28px rgba(192,25,42,.4);
}
.login-box h1{
  font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;
  letter-spacing:3px;margin-bottom:4px;
  background:linear-gradient(135deg,#fff 30%,#ff8096);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.login-box p{font-size:10px;letter-spacing:2px;color:#6b3040;margin-bottom:28px;font-family:'Space Grotesk',sans-serif;text-transform:uppercase;}
.avatar-pick-wrap{display:flex;justify-content:center;margin-bottom:22px;}
.avatar-pick{
  width:76px;height:76px;border-radius:50%;
  background:#1a0810;border:2px dashed #4a1828;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;gap:3px;transition:all .2s;position:relative;overflow:hidden;
}
.avatar-pick:hover{border-color:#c0192a;transform:scale(1.04);}
.avatar-pick img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-pick-icon{font-size:20px;}
.avatar-pick-hint{font-size:9px;color:#4a1828;font-family:'Space Grotesk',sans-serif;}
.login-input{
  width:100%;padding:12px 16px 12px 42px;border-radius:16px;
  background:#0d0508;border:1px solid #2a0e18;
  color:#f0e8e8;font-size:14px;font-family:'Manrope',sans-serif;
  outline:none;transition:all .2s;margin-bottom:12px;
}
.login-input:focus{border-color:#c0192a;box-shadow:0 0 0 3px rgba(192,25,42,.1);}
.login-input::placeholder{color:#3a1820;}
.input-wrap{position:relative;}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:#3a1820;}
.login-error{display:none;color:#ff6080;font-size:12px;margin-bottom:10px;text-align:left;padding-left:4px;}
.login-btn{
  width:100%;padding:13px;border-radius:16px;border:none;cursor:pointer;
  font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;
  color:#fff;transition:all .2s;
  background:linear-gradient(135deg,#c0192a,#8b0000);
  box-shadow:0 4px 20px rgba(192,25,42,.35);
}
.login-btn:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(192,25,42,.5);}
.login-btn:active{transform:scale(.97);}

/* HEADER */
header{
  flex-shrink:0;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
  background:rgba(8,3,5,.75);border-bottom:1px solid rgba(200,50,80,.1);
  position:relative;z-index:10;
}
.hdr-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:15px;
  border:1px solid rgba(200,50,80,.2);}
.hdr-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;}
.hdr-avatar.small{width:22px;height:22px;font-size:10px;}
.online-dot{width:11px;height:11px;border-radius:50%;background:#3a1828;border:2px solid #080305;transition:all .3s;position:absolute;bottom:-1px;right:-1px;}

.status-btn,.profile-btn{
  display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:12px;
  background:rgba(15,5,8,.8);border:1px solid rgba(200,50,80,.15);
  color:#c8a0a8;font-size:11px;cursor:pointer;transition:all .2s;
  font-family:'Space Grotesk',sans-serif;
}
.status-btn:hover,.profile-btn:hover{border-color:rgba(192,25,42,.4);}
.status-dropdown{
  display:none;position:absolute;right:0;top:calc(100% + 6px);
  background:rgba(15,5,8,.97);border:1px solid rgba(200,50,80,.15);
  border-radius:18px;padding:8px;width:180px;z-index:100;
  box-shadow:0 8px 40px rgba(0,0,0,.8);
}
.status-dropdown.open{display:block;}
.status-opt{
  display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;
  background:transparent;border:none;border-radius:10px;
  cursor:pointer;color:#c8a0a8;font-size:12px;font-family:'Manrope',sans-serif;text-align:left;
  transition:background .15s;
}
.status-opt:hover{background:rgba(192,25,42,.15);}
.status-opt.active{background:rgba(192,25,42,.2);color:#fff;}

#messages::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(8,3,5,.65) 0%,rgba(8,3,5,.45) 50%,rgba(8,3,5,.65) 100%);
  pointer-events:none;z-index:0;
}
#messages>*{position:relative;z-index:1;}

.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:auto;gap:10px;color:#3a1828;text-align:center;
}
.empty-state .empty-icon{font-size:44px;opacity:.4;}
.empty-state span{font-size:12px;letter-spacing:2px;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;}

/* MSG GROUPS */
.msg-group{display:flex;flex-direction:column;margin-bottom:10px;}
.msg-group.mine{align-items:flex-end;}
.msg-group.theirs{align-items:flex-start;}
.msg-author{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;padding:0 4px;font-family:'Space Grotesk',sans-serif;}
.mine .msg-author{color:#ff8096;}
.theirs .msg-author{color:#ffb8c0;}
.msg-row{display:flex;align-items:flex-end;gap:7px;margin-bottom:2px;}
.mine .msg-row{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:11px;flex-shrink:0;}
.msg-av img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;}
.mine .msg-av{background:linear-gradient(135deg,#c0192a,#8b0000);}
.theirs .msg-av{background:linear-gradient(135deg,#8b0020,#5a0010);}
.msg-av.invisible{visibility:hidden;}

/* BUBBLES */
.msg-bubble{
  max-width:280px;padding:10px 14px;font-size:14px;line-height:1.55;
  word-break:break-word;color:#f0e8e8;cursor:pointer;transition:filter .15s;
  font-weight:300;
}
.msg-bubble:hover{filter:brightness(1.1);}
.mine .msg-bubble{
  background:rgba(120,10,25,.75);border:1px solid rgba(200,50,80,.3);
  border-radius:18px 4px 18px 18px;
  box-shadow:0 2px 20px rgba(192,25,42,.15),inset 0 1px 0 rgba(255,255,255,.06);
}
.mine .msg-bubble.grouped{border-radius:18px 4px 4px 18px;}
.theirs .msg-bubble{
  background:rgba(20,8,10,.8);border:1px solid rgba(200,50,80,.15);
  border-radius:4px 18px 18px 18px;
  box-shadow:0 2px 16px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
}
.theirs .msg-bubble.grouped{border-radius:4px 18px 18px 4px;}
.msg-bubble.sticker{
  background:transparent!important;border:none!important;box-shadow:none!important;
  padding:4px;font-size:56px;line-height:1;max-width:80px;
  transition:transform .15s,filter .15s;
}
.msg-bubble.sticker:hover{transform:scale(1.12);}

.del-btn{
  background:none;border:1px solid transparent;border-radius:6px;
  color:#ff4060;cursor:pointer;font-size:11px;padding:2px 6px;
  opacity:0;transition:opacity .15s;flex-shrink:0;align-self:center;
}
.msg-row:hover .del-btn{opacity:.6;border-color:rgba(255,64,96,.2);}
.del-btn:hover{opacity:1!important;}

.msg-time{font-size:9px;color:#4a2030;padding:0 36px;margin-top:3px;font-family:'Space Grotesk',sans-serif;}
.mine .msg-time{text-align:right;}
.theirs .msg-time{text-align:left;}

/* REACTIONS */
.reactions-row{display:flex;flex-wrap:wrap;gap:3px;padding:2px 36px;}
.mine .reactions-row{justify-content:flex-end;}
.theirs .reactions-row{justify-content:flex-start;}
.reaction-chip{
  display:flex;align-items:center;gap:2px;
  background:rgba(20,8,10,.8);border:1px solid rgba(200,50,80,.2);
  border-radius:20px;padding:2px 7px;font-size:12px;cursor:pointer;color:#f0e8e8;transition:all .15s;
}
.reaction-chip:hover{border-color:rgba(192,25,42,.5);}
.reaction-chip.mine-reaction{background:rgba(120,10,25,.6);border-color:rgba(192,25,42,.5);}
.reaction-chip .cnt{font-size:9px;color:#6b3040;}

/* REACTION POPUP */
.reaction-popup{
  position:fixed;z-index:200;display:flex;gap:3px;padding:6px 12px;
  background:rgba(15,5,8,.97);border:1px solid rgba(200,50,80,.2);
  border-radius:32px;box-shadow:0 8px 40px rgba(0,0,0,.8);
  backdrop-filter:blur(20px);
}
.reaction-popup.hidden{display:none;}
.reaction-popup button{background:none;border:none;font-size:22px;cursor:pointer;padding:2px 3px;border-radius:8px;transition:transform .1s;line-height:1;}
.reaction-popup button:hover{transform:scale(1.35);}

/* PICKER PANELS */
.picker-panel{display:none;flex-shrink:0;background:rgba(8,3,5,.92);border-top:1px solid rgba(200,50,80,.1);padding:10px 12px;}
.picker-panel.open{display:block;}
.panel-tabs{display:flex;gap:6px;margin-bottom:8px;}
.panel-tab{
  padding:4px 12px;background:transparent;border:1px solid rgba(200,50,80,.2);
  border-radius:20px;font-size:15px;cursor:pointer;transition:all .15s;line-height:1;
}
.panel-tab.active{background:rgba(192,25,42,.25);border-color:rgba(192,25,42,.5);}
.emoji-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;overflow-y:auto;max-height:110px;scrollbar-width:thin;scrollbar-color:#2a0e18 transparent;}
.emoji-btn{background:none;border:none;font-size:21px;cursor:pointer;padding:4px;border-radius:7px;line-height:1;transition:transform .1s,background .1s;}
.emoji-btn:hover{transform:scale(1.3);background:rgba(192,25,42,.15);}
.sticker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;overflow-y:auto;max-height:110px;}
.sticker-btn{background:rgba(20,8,10,.8);border:1px solid rgba(200,50,80,.15);border-radius:10px;font-size:32px;cursor:pointer;padding:6px 3px;line-height:1;transition:all .15s;}
.sticker-btn:hover{background:rgba(120,10,25,.6);border-color:rgba(192,25,42,.4);transform:scale(1.08);}

/* INPUT BAR */
.input-bar{
  flex-shrink:0;padding:10px 12px;
  background:rgba(8,3,5,.88);border-top:1px solid rgba(200,50,80,.1);
}
.input-inner{
  display:flex;align-items:flex-end;gap:8px;border-radius:28px;padding:6px 8px;
  background:rgba(15,5,8,.9);border:1px solid rgba(200,50,80,.15);
}
.tool-btn{
  width:36px;height:36px;border-radius:50%;background:transparent;border:none;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .15s;color:#6b3040;
}
.tool-btn:hover,.tool-btn.active{background:rgba(192,25,42,.2);color:#ff8096;}
#msg-input{
  flex:1;padding:8px 4px;background:transparent;border:none;
  color:#f0e8e8;font-size:14px;font-family:'Manrope',sans-serif;
  outline:none;resize:none;line-height:1.5;max-height:100px;overflow-y:auto;font-weight:300;
}
#msg-input::placeholder{color:#2a1018;}
#send-btn{
  width:38px;height:38px;border-radius:50%;border:none;cursor:default;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:16px;transition:all .2s;opacity:.3;
  background:linear-gradient(135deg,#c0192a,#8b0000);color:#fff;
}
#send-btn.ready{opacity:1;cursor:pointer;box-shadow:0 0 18px rgba(192,25,42,.5);}

/* MODAL PROFILE */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:50;}
.modal-overlay.hidden{display:none;}
.modal-box{
  width:280px;border-radius:28px;padding:32px 28px;
  background:linear-gradient(160deg,rgba(25,8,12,.98),rgba(12,4,6,.99));
  border:1px solid rgba(200,50,80,.15);
  box-shadow:0 12px 60px rgba(0,0,0,.9);
}
.modal-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-align:center;color:#ff8096;margin-bottom:20px;text-transform:uppercase;}
.modal-avatar-wrap{display:flex;justify-content:center;margin-bottom:20px;}
.modal-avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,#c0192a,#8b0000);
  display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#fff;
  cursor:pointer;position:relative;overflow:hidden;border:2px solid rgba(200,50,80,.3);
  transition:border-color .2s;
}
.modal-avatar:hover{border-color:rgba(192,25,42,.7);}
.modal-avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%;}
.modal-avatar-ov{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-size:20px;opacity:0;transition:opacity .2s;border-radius:50%;}
.modal-avatar:hover .modal-avatar-ov{opacity:1;}
.modal-actions{display:flex;gap:10px;}
.btn-cancel{flex:1;padding:11px;border-radius:14px;background:transparent;border:1px solid rgba(200,50,80,.2);color:#6b3040;font-size:12px;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .2s;}
.btn-cancel:hover{border-color:rgba(192,25,42,.4);color:#c8a0a8;}
.btn-save{flex:1;padding:11px;border-radius:14px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;color:#fff;background:linear-gradient(135deg,#c0192a,#8b0000);transition:all .2s;}
.btn-save:hover{box-shadow:0 4px 16px rgba(192,25,42,.4);}

@keyframes fadeUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.msg-anim{animation:fadeUp .18s ease;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-box">
    <div class="login-icon">💬</div>
    <h1>ЛИЧНЫЙ ЧАТ</h1>
    <p>только вы двое</p>
    <div class="avatar-pick-wrap">
      <div class="avatar-pick" id="login-avatar-pick">
        <span class="avatar-pick-icon">🖼️</span>
        <span class="avatar-pick-hint">фото</span>
      </div>
      <input type="file" id="login-avatar-input" accept="image/*" style="display:none;"/>
    </div>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input id="name-input" class="login-input" type="text" placeholder="Ваше имя..." maxlength="20"/>
    </div>
    <div id="login-error" class="login-error"></div>
    <button id="login-btn" class="login-btn">ВОЙТИ</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat-screen" class="screen">

  <!-- Header -->
  <header>
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="position:relative;">
        <div class="hdr-avatar" id="other-av-wrap">
          <img id="other-av-img" src="" alt="" style="display:none;"/>
          <span id="other-av-letter">?</span>
        </div>
        <div class="online-dot" id="online-dot"></div>
      </div>
      <div>
        <div id="other-name" style="font-weight:700;font-size:14px;color:#ffb8c0;">Ожидание...</div>
        <div id="other-status" style="font-size:10px;color:#6b3040;font-family:'Space Grotesk',sans-serif;">нет собеседника</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:8px;">
      <div style="position:relative;" id="status-wrapper">
        <button class="status-btn" id="status-btn">
          <span id="my-status-emoji" style="font-size:14px;">🏠</span>
          <span id="my-status-label">Дома</span>
          <span style="font-size:9px;color:#3a1828;">▾</span>
        </button>
        <div class="status-dropdown" id="status-dropdown"></div>
      </div>

      <button class="profile-btn" id="my-profile-btn">
        <div class="hdr-avatar small" style="position:relative;">
          <img id="my-av-img" src="" alt="" style="display:none;"/>
          <span id="my-av-letter">?</span>
        </div>
        <span id="display-username">...</span>
        <span style="font-size:12px;">✏️</span>
      </button>
    </div>
  </header>

  <!-- Profile modal -->
  <div class="modal-overlay hidden" id="profile-modal">
    <div class="modal-box">
      <div class="modal-title">Мой профиль</div>
      <div class="modal-avatar-wrap">
        <div class="modal-avatar" id="modal-av-preview">
          <img id="modal-av-img" src="" alt="" style="display:none;"/>
          <span id="modal-av-letter">?</span>
          <div class="modal-avatar-ov">📷</div>
        </div>
        <input type="file" id="modal-av-input" accept="image/*" style="display:none;"/>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="modal-cancel">Отмена</button>
        <button class="btn-save" id="modal-save">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <span>Начните разговор</span>
    </div>
  </div>

  <!-- Emoji panel -->
  <div class="picker-panel" id="emoji-panel">
    <div class="panel-tabs" id="emoji-tabs"></div>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>

  <!-- Sticker panel -->
  <div class="picker-panel" id="sticker-panel">
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#3a1828;margin-bottom:7px;font-family:'Space Grotesk',sans-serif;">Стикеры</div>
    <div class="panel-tabs" id="sticker-tabs"></div>
    <div class="sticker-grid" id="sticker-grid"></div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="input-inner">
      <button class="tool-btn" id="emoji-btn">😊</button>
      <button class="tool-btn" id="sticker-btn">🎭</button>
      <textarea id="msg-input" placeholder="Написать..." rows="1"></textarea>
      <button id="send-btn">➤</button>
    </div>
  </div>
</div>

<!-- Reaction popup -->
<div class="reaction-popup hidden" id="reaction-popup"></div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
